<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mobile Magic Lens</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; touch-action: none; }
        body, html { width: 100%; height: 100%; overflow: hidden; background: #f0f2f5; }

        .world { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; }

        /* 主世界：亮色 */
        .main-world {
            background-color: #ffffff;
            background-image: radial-gradient(#d1d1d1 1px, transparent 1px);
            background-size: 30px 30px;
        }

        /* 里世界：暗色 */
        .linked-world {
            background-color: #000;
            background-image: radial-gradient(#333 1px, transparent 1px);
            background-size: 30px 30px;
        }

        /* 居中物体 */
        .object {
            position: absolute; top: 50%; left: 50%;
            width: 120px; height: 120px; margin: -60px;
            display: flex; align-items: center; justify-content: center;
            font-size: 40px; border-radius: 20px;
        }
        .main-world .object { background: #eee; border: 2px solid #333; color: #333; }
        .linked-world .object { background: #1a1a1a; border: 2px solid #00ffcc; color: #00ffcc; box-shadow: 0 0 20px #00ffcc; }

        /* 手机端透视窗 */
        .floating-window {
            position: absolute; top: 0; left: 0;
            width: 200px; height: 200px; /* 手机端默认窗口小一点 */
            border-radius: 50%; /* 手机上做成圆形透镜更有feel */
            border: 3px solid #555;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            overflow: hidden;
            z-index: 100;
            display: none;
        }

        #showBtn {
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
            padding: 15px 40px; border-radius: 30px; border: none;
            background: #333; color: #fff; font-size: 18px; z-index: 200;
        }
    </style>
</head>
<body>

    <div class="world main-world">
        <div class="object">⚪</div>
    </div>

    <button id="showBtn">开启透视</button>

    <div id="floatingWindow" class="floating-window">
        <div id="linkedWorld" class="world linked-world">
            <div class="object">💠</div>
        </div>
    </div>

    <script>
        const win = document.getElementById('floatingWindow');
        const world = document.getElementById('linkedWorld');
        const btn = document.getElementById('showBtn');

        let x = window.innerWidth / 2 - 100;
        let y = window.innerHeight / 2 - 100;

        function update() {
            win.style.transform = `translate(${x}px, ${y}px)`;
            world.style.transform = `translate(${-x}px, ${-y}px)`;
        }

        btn.onclick = () => {
            win.style.display = 'block';
            btn.style.display = 'none';
            update();
        };

        // 触摸拖动逻辑
        win.addEventListener('touchstart', (e) => {
            const touch = e.touches[0];
            offsetY = touch.clientY - y;
            offsetX = touch.clientX - x;
        });

        win.addEventListener('touchmove', (e) => {
            const touch = e.touches[0];
            x = touch.clientX - offsetX;
            y = touch.clientY - offsetY;
            update();
            e.preventDefault(); // 防止页面滚动
        }, { passive: false });
    </script>
</body>
</html>
